<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Nexora Estate luxury real estate template">
  <defs>
    <linearGradient id="re-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfcfa"/>
      <stop offset="50%" stop-color="#f8f6f2"/>
      <stop offset="100%" stop-color="#f0ebe3"/>
    </linearGradient>
    <linearGradient id="re-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a962" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a962" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#re-bg)"/>
  <rect width="800" height="520" fill="url(#re-glow)"/>
  <rect x="0" y="0" width="800" height="180" fill="#141414" opacity="0.92"/>
  <rect x="60" y="220" width="200" height="240" rx="0" fill="#141414" opacity="0.06"/>
  <rect x="280" y="200" width="200" height="260" rx="0" fill="#c9a962" opacity="0.15"/>
  <rect x="500" y="230" width="240" height="230" rx="0" fill="#141414" opacity="0.08"/>
  <g transform="translate(400 90)">
    <text fill="#ffffff" font-family="Georgia, serif" font-size="42" font-weight="500" text-anchor="middle" y="0">Nexora Estate</text>
    <text fill="#c9a962" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="0.35em" text-anchor="middle" y="32">LUXURY REAL ESTATE</text>
    <rect x="-100" y="48" width="200" height="2" fill="#c9a962"/>
  </g>
  <g transform="translate(400 380)">
    <text fill="#141414" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="0.2em" text-anchor="middle">CHAMPAGNE + CHARCOAL</text>
  </g>
  <rect x="0" y="0" width="800" height="520" fill="none" stroke="#141414" stroke-opacity="0.08" stroke-width="2"/>
</svg>
